// 市区町村の緯度経度（ルート最適化用）事務所は牛久市
const CITY_COORDS = {
  "牛久市":[35.979,140.150], "龍ケ崎市":[35.911,140.185], "取手市":[35.912,140.050],
  "阿見町":[36.030,140.200], "土浦市":[36.080,140.200], "かすみがうら市":[36.150,140.200],
  "つくば市":[36.082,140.112], "古河市":[36.190,139.700], "結城市":[36.300,139.880],
  "桜川市":[36.370,140.100], "八千代町":[36.180,139.880], "石岡市":[36.189,140.288],
};
const OFFICE_COORD = CITY_COORDS["牛久市"];

function geoDist(a, b) {
  const dx = (a[0] - b[0]) * 111.0;
  const dy = (a[1] - b[1]) * 91.0;
  return Math.sqrt(dx * dx + dy * dy);
}

function getCoord(item) { return CITY_COORDS[item.city] || OFFICE_COORD; }

// 経路の総距離を計算（事務所→item[0]→item[1]→...）
function routeDist(route) {
  let d = geoDist(OFFICE_COORD, getCoord(route[0]));
  for (let i = 1; i < route.length; i++) d += geoDist(getCoord(route[i-1]), getCoord(route[i]));
  return d;
}

// 全順列を試して最短ルートを見つける（10件以下用）
function permuteBest(items) {
  let best = null, bestD = Infinity;
  const n = items.length;
  const perm = items.slice();
  function swap(i, j) { const t = perm[i]; perm[i] = perm[j]; perm[j] = t; }
  function generate(k) {
    if (k === 1) {
      const d = routeDist(perm);
      if (d < bestD) { bestD = d; best = perm.slice(); }
      return;
    }
    for (let i = 0; i < k; i++) {
      generate(k - 1);
      swap(k % 2 === 0 ? i : 0, k - 1);
    }
  }
  generate(n);
  return best;
}

// 2-opt改善（大量物件用）
function twoOpt(route) {
  let improved = true;
  while (improved) {
    improved = false;
    for (let i = 0; i < route.length - 1; i++) {
      for (let j = i + 2; j < route.length; j++) {
        const newRoute = route.slice(0, i + 1).concat(route.slice(i + 1, j + 1).reverse()).concat(route.slice(j + 1));
        if (routeDist(newRoute) < routeDist(route)) { route = newRoute; improved = true; }
      }
    }
  }
  return route;
}

// ルート最適化メイン（startCoord: 現在地の[lat,lng]）
function optimizeRoute(items, startCoord) {
  const origin = startCoord || OFFICE_COORD;
  if (items.length <= 1) return items;
  // 同じ住所の物件をグループ化（同じ場所は連続で）
  const groups = {};
  items.forEach(it => {
    const key = it.addr;
    if (!groups[key]) groups[key] = [];
    groups[key].push(it);
  });
  const unique = Object.values(groups).map(g => ({...g[0], _group: g}));

  // 現在地起点の距離計算（折り返しペナルティ付き）
  const routeDistFrom = (route) => {
    let d = geoDist(origin, getCoord(route[0]));
    for (let i = 1; i < route.length; i++) {
      d += geoDist(getCoord(route[i-1]), getCoord(route[i]));
      // 折り返しペナルティ: 方向転換があれば実際は通過済みエリアを再走行するため加算
      const prev = i >= 2 ? getCoord(route[i-2]) : origin;
      const cur = getCoord(route[i-1]);
      const nxt = getCoord(route[i]);
      const dx1 = cur[0]-prev[0], dy1 = cur[1]-prev[1];
      const dx2 = nxt[0]-cur[0], dy2 = nxt[1]-cur[1];
      const dot = dx1*dx2 + dy1*dy2;
      if (dot < 0) d += geoDist(prev, nxt) * 0.7;
    }
    return d;
  };

  let sorted;
  if (unique.length <= 10) {
    // 全順列で最短を見つける
    let best = null, bestD = Infinity;
    const perm = unique.slice();
    function swap(i, j) { const t = perm[i]; perm[i] = perm[j]; perm[j] = t; }
    function gen(k) {
      if (k === 1) {
        const d = routeDistFrom(perm);
        if (d < bestD) { bestD = d; best = perm.slice(); }
        return;
      }
      for (let i = 0; i < k; i++) { gen(k - 1); swap(k % 2 === 0 ? i : 0, k - 1); }
    }
    gen(unique.length);
    sorted = best;
  } else {
    // 最近傍法 + 2-opt
    const remaining = [...unique];
    const ordered = [];
    let cur = origin;
    while (remaining.length > 0) {
      let bi = 0, bd = Infinity;
      for (let i = 0; i < remaining.length; i++) {
        const d = geoDist(cur, getCoord(remaining[i]));
        if (d < bd) { bd = d; bi = i; }
      }
      ordered.push(remaining.splice(bi, 1)[0]);
      cur = getCoord(ordered[ordered.length - 1]);
    }
    // 2-opt with origin
    let route = ordered;
    let imp = true;
    while (imp) {
      imp = false;
      for (let i = 0; i < route.length - 1; i++) {
        for (let j = i + 2; j < route.length; j++) {
          const nr = route.slice(0, i + 1).concat(route.slice(i + 1, j + 1).reverse()).concat(route.slice(j + 1));
          if (routeDistFrom(nr) < routeDistFrom(route)) { route = nr; imp = true; }
        }
      }
    }
    sorted = route;
  }
  // グループを展開
  const result = [];
  sorted.forEach(s => { if (s._group) result.push(...s._group); else result.push(s); });
  return result;
}

// ユーザーフィルター選択肢を動的生成
function getUserFilterOptions(includeNone) {
  const opts = [['all', '全員']];
  USERS.forEach(u => {
    if (u.name === '管理者') return;
    if (u.role === 'office') return;
    const shortName = u.name.split('　')[0] || u.name.split(' ')[0] || u.name;
    opts.push([u.id, shortName]);
  });
  if (includeNone) opts.push(['none', '未割当']);
  return opts;
}

// API同期
async function syncData(silent) {
  if (!silent) { isLoading = true; render(); }
  try {
    const res = await fetch(API_URL, {
      headers: { 'Authorization': 'Bearer ' + API_KEY },
      cache: 'no-store',
    });
    if (!res.ok) throw new Error('同期エラー: ' + res.status);
    const data = await res.json();

    // ユーザーマッピング
    USERS = data.users.map(u => ({ id: u.id, name: u.name, role: u.role }));

    // 物件マッピング
    PROPERTIES = data.properties.map(p => ({
      id: p.id, name: p.name || '', city: p.city || '', address: p.address || '',
      buildingNo: p.buildingNo || '', photoNotTaken: p.photoNotTaken,
      nextAction: p.nextAction || '撮影待ち', assignedUserId: p.assignedUserId,
    }));

    // 査定→売却案件マッピング
    SELL_CASES = data.assessments.map(a => ({
      id: a.id, customerName: a.customerName || '', phone: a.customer?.phone || '',
      address: a.address || '', propertyType: a.propertyType2 || '',
      source: a.source || '', status: a.status || '', callCount: a.callCount || 0,
      mediationStartDate: a.mediationStartDate ? a.mediationStartDate.split('T')[0] : '',
      mediationEndDate: a.mediationEndDate ? a.mediationEndDate.split('T')[0] : '',
      nextReportDueDate: a.nextReportDueDate ? a.nextReportDueDate.split('T')[0] : '',
      lastContactDate: a.lastContactDate ? a.lastContactDate.split('T')[0] : '',
      notes: a.notes || '', assignedUserId: a.assignedUserId,
    }));

    // 見込み案件マッピング
    BUY_PROSPECTS = data.prospects.map(p => ({
      id: p.id, _type: 'prospect', customerName: p.customerName || '',
      phone: p.phone || '', source: p.source || '', propertyName: p.propertyName || '',
      status: p.status || '', probability: p.probability || '',
      fundingType: p.fundingType || '', commission: p.commission || '',
      activityMemo: p.activityMemo || '', assignedUserId: p.assignedUserId,
    }));

    // 見込み客マッピング
    BUY_FUTURES = data.futures.map(f => ({
      id: f.id, _type: 'future', customerName: f.customer?.name || '',
      phone: f.phone || '', temperature: f.temperature || 'C',
      source: f.source || '', status: f.status || 'active',
      notes: f.notes || '', assignedUserId: f.assignedUserId,
    }));

    // タスクマッピング
    TASKS = data.tasks.map(t => {
      const dueDate = t.dueDate ? new Date(t.dueDate) : null;
      const isOverdue = dueDate ? dueDate < new Date() : false;
      let targetName = '';
      if (t.relatedType === 'assessment') {
        const a = data.assessments.find(x => x.id === t.relatedId);
        targetName = a?.customerName || '';
      } else if (t.relatedType === 'prospect') {
        const p = data.prospects.find(x => x.id === t.relatedId);
        targetName = p?.customerName || '';
      } else if (t.relatedType === 'future') {
        const f = data.futures.find(x => x.id === t.relatedId);
        targetName = f?.customer?.name || '';
      } else if (t.relatedType === 'property') {
        const p = data.properties.find(x => x.id === t.relatedId);
        targetName = p?.name || '';
      }
      return {
        id: t.id, title: t.title || '', category: t.category || '',
        targetName: targetName || t.title || '',
        detail: t.description || '', dueDate: t.dueDate || '',
        overdue: isOverdue,
        needsApproval: t.category === 'approval' || t.status === 'pending_approval',
        assignedUserId: t.assignedUserId,
      };
    });

    lastSyncTime = data.syncedAt;
    syncError = null;
    isLoading = false;

    // ログイン中ユーザーのID更新（UUID同期）
    if (state.user) {
      const updated = USERS.find(u => u.name === state.user.name);
      if (updated) state.user = { ...state.user, id: updated.id };
    }

    render();
  } catch (e) {
    syncError = e.message;
    isLoading = false;
    render();
  }
}

function render() {
  const scrollEl = document.getElementById('content-scroll');
  const savedScroll = scrollEl ? scrollEl.scrollTop : 0;
  const root = document.getElementById('root');
  if (isLoading) {
    root.innerHTML = renderLoadingScreen();
  } else if (syncError && USERS.length === 0) {
    root.innerHTML = renderSyncError();
  } else {
    root.innerHTML = state.user ? renderApp() : renderLogin();
  }
  attachEventListeners();
  const newScrollEl = document.getElementById('content-scroll');
  if (newScrollEl) newScrollEl.scrollTop = savedScroll;
}

function getNots() {
  return [
    ...TASKS.filter(t=>t.overdue).map(t=>({id:`n-${t.id}`,type:"overdue",icon:"🔴",title:t.title,body:`${t.targetName} - 期限超過`,time:t.dueDate,linkTab:"tasks"})),
    ...TASKS.filter(t=>t.needsApproval&&!t.overdue).map(t=>({id:`n-${t.id}`,type:"approval",icon:"⚠️",title:t.title,body:`${t.targetName} - 承認待ち`,time:t.dueDate,linkTab:"tasks"})),
    ...TASKS.filter(t=>!t.overdue&&!t.needsApproval).map(t=>({id:`n-${t.id}`,type:"info",icon:"📋",title:t.title,body:`${t.targetName} - ${new Date(t.dueDate).getMonth()+1}/${new Date(t.dueDate).getDate()}`,time:t.dueDate,linkTab:"tasks"})),
    ...SELL_CASES.filter(s=>s.nextReportDueDate&&new Date(s.nextReportDueDate)<=new Date()).map(s=>({id:`n-sell-${s.id}`,type:"overdue",icon:"🔴",title:"媒介報告期限超過",body:`${s.customerName} - ${s.address}`,time:s.nextReportDueDate,linkTab:"sales"})),
  ];
}

function getAllCities() {
  return [...new Set(PROPERTIES.filter(p=>p.photoNotTaken).map(p=>p.city).filter(Boolean))].sort((a,b)=>a.localeCompare(b,"ja"));
}

function extractBuildingNum(b){
  if(!b)return 9999;
  const m=b.match(/(\d+)/);
  return m?parseInt(m[1],10):9999;
}
function getFilteredProperties() {
  let list=PROPERTIES.filter(p=>p.photoNotTaken);
  if(state.filterUser==="none")list=list.filter(p=>!p.assignedUserId);
  else if(state.filterUser!=="all")list=list.filter(p=>p.assignedUserId===state.filterUser);
  if(state.filterCities.size>0){
    list=list.filter(p=>state.filterCities.has(p.city));
  }
  // 市町村→物件名→号棟番号 の順でソート
  list=[...list].sort((a,b)=>{
    const c=(a.city||'').localeCompare(b.city||'','ja');
    if(c!==0)return c;
    const n=(a.name||'').localeCompare(b.name||'','ja');
    if(n!==0)return n;
    return extractBuildingNum(a.buildingNo)-extractBuildingNum(b.buildingNo);
  });
  return list;
}

          <div style="font-size:22px;font-weight:800;color:${C.danger};">${overdueCount}</div>
        </div>
        <div style="flex:1;background:white;border-radius:12px;padding:10px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);">
          <div style="font-size:10px;color:${C.textL};">承認待ち</div>
          <div style="font-size:22px;font-weight:800;color:${C.warning};">${approvalCount}</div>
        </div>
      </div>
      <div style="display:flex;gap:6px;padding:6px 12px;overflow-x:auto;">
        ${getUserFilterOptions(false).map(([v,l])=>`
          <button class="task-user-filter" data-user="${v}" style="display:inline-flex;padding:7px 12px;border-radius:20px;border:1.5px solid ${state.filterUser===v?C.blue:C.border};background:${state.filterUser===v?C.blue:'white'};color:${state.filterUser===v?'white':C.text};font-size:12px;white-space:nowrap;cursor:pointer;">${l}</button>
        `).join('')}
      </div>
      <div style="display:flex;gap:6px;padding:4px 12px 6px;overflow-x:auto;">
        ${[["all","全て"],["overdue",`期限超過(${overdueCount})`],["approval",`承認待ち(${approvalCount})`],["follow_up","フォロー"]].map(([v,l])=>`
          <button class="task-filter" data-type="${v}" style="display:inline-flex;padding:7px 12px;border-radius:20px;border:1.5px solid ${state.filterType===v?C.blue:C.border};background:${state.filterType===v?C.blue:'white'};color:${state.filterType===v?'white':C.text};font-size:12px;white-space:nowrap;cursor:pointer;">${l}</button>
        `).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;padding:8px 16px 4px;">
        <span style="font-size:12px;font-weight:700;color:${C.textL};">タスク一覧</span>
        <span style="font-size:11px;color:${C.textL};">${filtered.length}件</span>
      </div>
      ${filtered.length===0?`<div style="text-align:center;padding:40px;color:${C.textL};font-size:13px;">タスクはありません</div>`:filtered.map(t=>{
        const formatDate=d=>{const dt=new Date(d);return`${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,"0")}`;};
        return`<div class="task-card" data-id="${t.id}" style="background:white;border-radius:12px;margin:6px 12px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08);border-left:4px solid ${t.overdue?C.danger:t.needsApproval?C.warning:C.blue};cursor:pointer;">
          <div style="font-size:13px;font-weight:600;margin-bottom:3px;">${t.title}</div>
          <div style="font-size:11px;color:${C.textL};margin-bottom:8px;">
            ${t.targetName} / ${USERS.find(u=>u.id===t.assignedUserId)?.name?.split('　')[0]||''} / 期限: ${formatDate(t.dueDate)}
            ${t.overdue?`<span style="color:${C.danger};"> (超過)</span>`:''}
          </div>
          <div style="display:flex;gap:8px;">
            ${t.needsApproval?`
              <button class="task-approve" data-id="${t.id}" style="padding:7px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:${C.green};color:white;">承認</button>
              <button class="task-reject" data-id="${t.id}" style="padding:7px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:${C.danger};color:white;">却下</button>
            `:`
              <button class="task-done" data-id="${t.id}" style="padding:7px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:${C.blue};color:white;">完了</button>
            `}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

        <span style="font-size:12px;color:${C.textL};min-width:72px;">担当</span>
        <span style="font-size:13px;">${USERS.find(u=>u.id===t.assignedUserId)?.name||'未割当'}</span>
      </div>
      <div style="padding:12px 16px;background:white;border-bottom:1px solid ${C.border};">
        <div style="font-size:12px;color:${C.textL};margin-bottom:6px;">詳細</div>
        <div style="font-size:13px;line-height:1.6;">${t.detail}</div>

      <div style="display:flex;gap:8px;padding:12px;">

          <button id="task-approve-detail" style="flex:1;padding:14px;border-radius:10px;border:none;background:${C.green};color:white;font-size:14px;font-weight:700;cursor:pointer;">承認</button>
          <button id="task-reject-detail" style="flex:1;padding:14px;border-radius:10px;border:none;background:${C.danger};color:white;font-size:14px;font-weight:700;cursor:pointer;">却下</button>
        `:`
          <button id="task-done-detail" style="flex:1;padding:14px;border-radius:10px;border:none;background:${C.blue};color:white;font-size:14px;font-weight:700;cursor:pointer;">完了にする</button>

function attachEventListeners() {
  // 同期エラーリトライ
  document.getElementById('retry-sync-btn')?.addEventListener('click',()=>syncData());
  if(isLoading) return;
  if(!state.user) {
    document.getElementById('login-btn')?.addEventListener('click',handleLogin);
    return;
  }

  document.getElementById('notif-btn')?.addEventListener('click',()=>{state.showNotif=!state.showNotif;render();});
  document.getElementById('logout-btn')?.addEventListener('click',()=>{state.user=null;state.tab='listing';render();});

  document.querySelectorAll('.tab-btn').forEach(b=>{
    b.addEventListener('click',e=>{
      state.tab=e.currentTarget.dataset.tab;
      state.detailSale=null;state.detailBuy=null;state.detailTask=null;state.showCallMemoSale=null;state.showCallMemoBuy=null;
      render();
    });
  });

  document.getElementById('mark-all-read')?.addEventListener('click',()=>{
    getNots().forEach(n=>state.readNotifs.add(n.id));
    render();
  });

  document.querySelectorAll('.notif-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const n=getNots().find(x=>x.id===el.dataset.notifId);
      state.readNotifs.add(n.id);
      state.showNotif=false;
      state.tab=n.linkTab;
      render();
    });
  });

  if(state.tab==='listing') {
    document.querySelectorAll('.user-filter').forEach(b=>b.addEventListener('click',e=>{state.filterUser=e.currentTarget.dataset.user;render();}));
    document.getElementById('mode-list')?.addEventListener('click',()=>{state.mode='list';render();});
    document.getElementById('mode-route')?.addEventListener('click',()=>{state.mode='route';render();});
    document.getElementById('select-all-btn')?.addEventListener('click',()=>{
      const filtered=getFilteredProperties();
      if(state.mode==='route'){
        const selectable=filtered.filter(p=>{const a=state.localAddresses[p.id]||p.address;return a&&a.trim();});
        const allSelected=selectable.length>0&&selectable.every(p=>state.selected.has(p.id));
        if(allSelected){selectable.forEach(p=>state.selected.delete(p.id));}
        else{selectable.forEach(p=>state.selected.add(p.id));}
      } else {
        const allChecked=filtered.length>0&&filtered.every(p=>state.checked.has(p.id));
        if(allChecked){filtered.forEach(p=>state.checked.delete(p.id));}
        else{filtered.forEach(p=>state.checked.add(p.id));}
      }
      render();
    });
    document.getElementById('city-filter-btn')?.addEventListener('click',()=>{state.showCityPicker=true;render();});
    document.querySelectorAll('.prop-check').forEach(el=>el.addEventListener('click',()=>{const id=el.dataset.id;state.checked.has(id)?state.checked.delete(id):state.checked.add(id);render();}));
    document.querySelectorAll('.prop-select').forEach(el=>el.addEventListener('click',()=>{
      const id=el.dataset.id;
      const p=PROPERTIES.find(x=>x.id===id);
      const addr=state.localAddresses[id]||p.address;
      if(!addr||!addr.trim()){state.toast='住所を入力してからルートに追加してください';render();return;}
      state.selected.has(id)?state.selected.delete(id):state.selected.add(id);
      render();
    }));
    document.querySelectorAll('.prop-toggle').forEach(el=>el.addEventListener('click',()=>{if(state.mode==='list'){const id=el.dataset.id;state.checked.has(id)?state.checked.delete(id):state.checked.add(id);render();}}));
    document.querySelectorAll('.addr-edit-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();state.editingAddr=e.currentTarget.dataset.id;state.addrInput=state.localAddresses[state.editingAddr]||'';render();}));
    document.getElementById('addr-cancel')?.addEventListener('click',()=>{state.editingAddr=null;render();});
    document.getElementById('addr-save')?.addEventListener('click',()=>{const val=document.getElementById('addr-input').value.trim();if(val){state.localAddresses[state.editingAddr]=val;state.toast='住所を保存しました';}state.editingAddr=null;render();});
    document.getElementById('city-backdrop')?.addEventListener('click',e=>{if(e.target===e.currentTarget){state.showCityPicker=false;render();}});
    // ピッカー表示中：背景スクロール完全ブロック + スワイプダウンで閉じる
    (function(){
      const backdrop=document.getElementById('city-backdrop');
      const panel=document.getElementById('city-panel');
      const handle=document.getElementById('city-handle');
      if(!backdrop||!panel||!handle) return;
      const cityList=document.getElementById('city-list-scroll');
      // content-scrollのスクロールを止める
      const contentScroll=document.getElementById('content-scroll');
      if(contentScroll) contentScroll.style.overflow='hidden';
      // backdrop全体でtouchmoveを制御
      backdrop.addEventListener('touchmove',e=>{
        // 市町村リスト内のスクロールだけ許可
        if(cityList&&cityList.contains(e.target)) return;
        e.preventDefault();
      },{passive:false});
      // スワイプダウンで閉じる
      let startY=0,currentY=0,dragging=false;
      const onStart=e=>{startY=e.touches[0].clientY;currentY=0;dragging=true;panel.style.transition='none';};
      const onMove=e=>{
        if(!dragging)return;
        currentY=e.touches[0].clientY-startY;
        if(currentY<0)currentY=0;
        panel.style.transform='translateY('+currentY+'px)';
        e.preventDefault();
      };
      const onEnd=()=>{
        if(!dragging)return;dragging=false;
        panel.style.transition='transform 0.2s ease';
        if(currentY>80){state.showCityPicker=false;render();}
        else{panel.style.transform='translateY(0)';}
      };
      handle.addEventListener('touchstart',onStart,{passive:true});
      handle.addEventListener('touchmove',onMove,{passive:false});
      handle.addEventListener('touchend',onEnd);
      // パネル本体のスワイプ（リスト外のみドラッグ開始）
      panel.addEventListener('touchstart',e=>{
        // 市町村リスト内のタッチはドラッグ開始しない（リストスクロール優先）
        if(cityList&&cityList.contains(e.target))return;
        onStart(e);
      },{passive:true});
      panel.addEventListener('touchmove',e=>{
        if(dragging){onMove(e);return;}
        // リスト内のスクロールは許可、リスト外のタッチは止める
        if(cityList&&cityList.contains(e.target))return;
        e.preventDefault();
      },{passive:false});
      panel.addEventListener('touchend',onEnd);
    })();
    document.getElementById('city-clear')?.addEventListener('click',()=>{state.filterCities=new Set();render();});
    document.getElementById('city-ok')?.addEventListener('click',()=>{state.showCityPicker=false;render();});
    document.querySelectorAll('.city-item').forEach(el=>el.addEventListener('click',()=>{const city=el.dataset.city;state.filterCities.has(city)?state.filterCities.delete(city):state.filterCities.add(city);render();}));
    document.getElementById('route-start-btn')?.addEventListener('click',()=>{
      const items=[];
      state.selected.forEach(id=>{
        const p=PROPERTIES.find(x=>x.id===id);
        if(p){const addr=state.localAddresses[id]||p.address;if(addr&&addr.trim())items.push({addr,city:p.city,name:p.name,buildingNo:p.buildingNo,id:p.id});}
      });
      if(items.length===0){state.toast='住所のある物件を選択してください';render();return;}
      state.toast='位置情報を取得中...';render();
      const buildRoute=(startCoord)=>{
        const sorted=optimizeRoute(items,startCoord);
        // 全ルートの地図確認用URL
        const addrs=sorted.map(x=>x.addr);
        const parts=addrs.map(a=>encodeURIComponent(a)).join('/');
        const originStr=startCoord?startCoord[0]+','+startCoord[1]:'';
        const oStr=originStr?encodeURIComponent(originStr):encodeURIComponent('現在地');
        const mapUrl='https://www.google.com/maps/dir/'+oStr+'/'+parts+'/data=!4m2!4m1!3e0';
        state.routeResult={stops:sorted,mapUrl:mapUrl,origin:originStr};
        state.toast=null;render();
      };
      if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(
          pos=>{buildRoute([pos.coords.latitude,pos.coords.longitude]);},
          ()=>{state.toast='位置情報が取得できません。事務所起点で計算します';render();setTimeout(()=>buildRoute(OFFICE_COORD),1000);},
          {timeout:5000,enableHighAccuracy:true}
        );
      } else {
        buildRoute(OFFICE_COORD);
      }
    });
  }

  // ルート結果モーダルのイベント
  if(state.routeResult){
    document.getElementById('route-result-backdrop')?.addEventListener('click',e=>{if(e.target===e.currentTarget){state.routeResult=null;render();}});
    document.getElementById('route-result-close')?.addEventListener('click',()=>{state.routeResult=null;render();});
    // 物件タップで完了/未完了を切り替え（撮影チェックにも反映）
    document.querySelectorAll('.route-stop-item').forEach(el=>el.addEventListener('click',e=>{
      // ナビボタンのクリックは除外
      if(e.target.closest('.route-navi-btn'))return;
      const id=el.dataset.id;
      state.checked.has(id)?state.checked.delete(id):state.checked.add(id);
      render();
    }));
    // 個別ナビボタン: comgooglemaps:// で1件ずつ確実にナビ開始
    document.querySelectorAll('.route-navi-btn').forEach(btn=>btn.addEventListener('click',e=>{
      e.stopPropagation();
      const idx=parseInt(btn.dataset.idx);
      const stop=state.routeResult.stops[idx];
      if(!stop)return;
      const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
      if(isIOS){
        window.location.href='comgooglemaps://?directionsmode=driving&daddr='+encodeURIComponent(stop.addr);
      } else {
        window.open('https://www.google.com/maps/dir/?api=1&travelmode=driving&destination='+encodeURIComponent(stop.addr),'_blank');
      }
    }));
    // 最初からナビ開始 = 1番目のナビボタンと同じ
    document.getElementById('route-all-navi')?.addEventListener('click',()=>{
      const stop=state.routeResult.stops[0];
      if(!stop)return;
      const isIOS=/iPhone|iPad|iPod/.test(navigator.userAgent);
      if(isIOS){
        window.location.href='comgooglemaps://?directionsmode=driving&daddr='+encodeURIComponent(stop.addr);
      } else {
        window.open('https://www.google.com/maps/dir/?api=1&travelmode=driving&destination='+encodeURIComponent(stop.addr),'_blank');
      }
    });
    // 全ルートを地図で確認（Safari/ブラウザで開く）
    document.getElementById('route-map-overview')?.addEventListener('click',()=>{
      const a=document.createElement('a');
      a.href=state.routeResult.mapUrl;a.target='_blank';a.rel='noopener';
      document.body.appendChild(a);a.click();
      setTimeout(()=>document.body.removeChild(a),100);
    });
    // モーダル内スクロール制御
    const routeBackdrop=document.getElementById('route-result-backdrop');
    const routeScroll=document.getElementById('route-stops-scroll');
    if(routeBackdrop){
      routeBackdrop.addEventListener('touchmove',e=>{
        if(routeScroll&&routeScroll.contains(e.target))return;
        e.preventDefault();
      },{passive:false});
    }
  }

  if(state.tab==='sales'||state.detailSale||state.showCallMemoSale) {
    document.querySelectorAll('.sales-user-filter').forEach(b=>b.addEventListener('click',e=>{state.filterUser=e.currentTarget.dataset.user;render();}));
    document.querySelectorAll('.sale-card').forEach(el=>el.addEventListener('click',()=>{state.detailSale=SELL_CASES.find(x=>x.id===el.dataset.id);render();}));
    document.querySelectorAll('.sale-call-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();state.showCallMemoSale=SELL_CASES.find(x=>x.id===e.currentTarget.dataset.id);state.callMemoSale='';render();}));
    document.getElementById('sale-back')?.addEventListener('click',()=>{state.detailSale=null;render();});
    document.getElementById('sale-call')?.addEventListener('click',()=>{const p=state.detailSale;state.detailSale=null;state.showCallMemoSale=p;state.callMemoSale='';render();});
    document.getElementById('memo-back')?.addEventListener('click',()=>{state.showCallMemoSale=null;render();});
    document.getElementById('call-memo-input')?.addEventListener('change',e=>{state.callMemoSale=e.target.value;});
    document.getElementById('memo-save')?.addEventListener('click',()=>{if(state.callMemoSale.trim()){const now=new Date().toLocaleString('ja-JP');if(!state.memosSale[state.showCallMemoSale.id])state.memosSale[state.showCallMemoSale.id]=[];state.memosSale[state.showCallMemoSale.id].push({text:state.callMemoSale,date:now});state.toast='メモを保存しました（PC版に反映）';}state.callMemoSale='';state.showCallMemoSale=null;render();});
  }

  if(state.tab==='buy'||state.detailBuy||state.showCallMemoBuy) {
    document.getElementById('view-futures')?.addEventListener('click',()=>{state.viewMode='futures';render();});
    document.getElementById('view-prospects')?.addEventListener('click',()=>{state.viewMode='prospects';render();});
    document.querySelectorAll('.buy-user-filter').forEach(b=>b.addEventListener('click',e=>{state.filterUser=e.currentTarget.dataset.user;render();}));
    document.querySelectorAll('.buy-status-filter').forEach(b=>b.addEventListener('click',e=>{state.filterStatus=e.currentTarget.dataset.status;render();}));
    document.querySelectorAll('.buy-card').forEach(el=>el.addEventListener('click',()=>{state.detailBuy=BUY_PROSPECTS.concat(BUY_FUTURES).find(x=>x.id===el.dataset.id);render();}));
    document.querySelectorAll('.buy-call-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();state.showCallMemoBuy=BUY_PROSPECTS.concat(BUY_FUTURES).find(x=>x.id===e.currentTarget.dataset.id);state.callMemoBuy='';render();}));
    document.getElementById('buy-back')?.addEventListener('click',()=>{state.detailBuy=null;render();});
    document.getElementById('buy-call')?.addEventListener('click',()=>{const p=state.detailBuy;state.detailBuy=null;state.showCallMemoBuy=p;state.callMemoBuy='';render();});
    document.getElementById('buy-memo-back')?.addEventListener('click',()=>{state.showCallMemoBuy=null;render();});
    document.getElementById('call-memo-buy-input')?.addEventListener('change',e=>{state.callMemoBuy=e.target.value;});
    document.getElementById('buy-memo-save')?.addEventListener('click',()=>{if(state.callMemoBuy.trim()){const now=new Date().toLocaleString('ja-JP');if(!state.memosBuy[state.showCallMemoBuy.id])state.memosBuy[state.showCallMemoBuy.id]=[];state.memosBuy[state.showCallMemoBuy.id].push({text:state.callMemoBuy,date:now});state.toast='メモを保存しました（PC版に反映）';}state.callMemoBuy='';state.showCallMemoBuy=null;render();});
  }

  if(state.tab==='tasks'||state.detailTask) {
    document.querySelectorAll('.task-user-filter').forEach(b=>b.addEventListener('click',e=>{state.filterUser=e.currentTarget.dataset.user;render();}));
    document.querySelectorAll('.task-filter').forEach(b=>b.addEventListener('click',e=>{state.filterType=e.currentTarget.dataset.type;render();}));
    document.querySelectorAll('.task-card').forEach(el=>el.addEventListener('click',()=>{state.detailTask=TASKS.find(x=>x.id===el.dataset.id);render();}));
    document.querySelectorAll('.task-approve').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();state.completed.add(e.currentTarget.dataset.id);state.toast='承認しました（PC版に反映）';render();}));
    document.querySelectorAll('.task-reject').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();state.completed.add(e.currentTarget.dataset.id);state.toast='却下しました（PC版に反映）';render();}));
    document.querySelectorAll('.task-done').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();state.completed.add(e.currentTarget.dataset.id);state.toast='完了しました';render();}));
    document.getElementById('task-back')?.addEventListener('click',()=>{state.detailTask=null;render();});
    document.getElementById('task-approve-detail')?.addEventListener('click',()=>{state.completed.add(state.detailTask.id);state.detailTask=null;state.toast='承認しました（PC版に反映）';render();});
    document.getElementById('task-reject-detail')?.addEventListener('click',()=>{state.completed.add(state.detailTask.id);state.detailTask=null;state.toast='却下しました（PC版に反映）';render();});
    document.getElementById('task-done-detail')?.addEventListener('click',()=>{state.completed.add(state.detailTask.id);state.detailTask=null;state.toast='完了しました';render();});
  }
}

function handleLogin() {
  const email=document.getElementById('login-email').value;
  const pw=document.getElementById('login-pw').value;
  const cred=AUTH_CREDENTIALS[email];
  if(!cred){document.getElementById('login-error').textContent='メールアドレスが見つかりません';return;}
  if(cred.pw!==pw){document.getElementById('login-error').textContent='パスワードが正しくありません';return;}
  // API同期済みユーザーを名前で検索
  const apiUser=USERS.find(u=>u.name===cred.name);
  if(apiUser){
    state.user={...apiUser, email};
  } else {
    state.user={id:email, name:cred.name, email, role:'admin'};
  }
  state.tab='listing';
  render();
}

if('serviceWorker'in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>r.unregister());
    }).then(()=>{
      return navigator.serviceWorker.register('./sw.js?v=5');
    }).catch(err=>{});
    if('caches'in window){
      caches.keys().then(names=>{names.forEach(n=>caches.delete(n));});
    }
  });
}

// 初回同期→描画
render(); // ローディング画面表示
syncData();

// 定期同期（5分ごと）
setInterval(()=>{ if(state.user) syncData(true); }, 5*60*1000);

// アプリ復帰時に同期
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='visible' && state.user){
    syncData(true);
  }
});
    </script>
